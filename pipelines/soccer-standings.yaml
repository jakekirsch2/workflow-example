name: soccer-standings
description: "Fetch Premier League standings and create a fun dashboard with team stats"
schedule: "0 12 * * *"  # Run daily at noon

tasks:
  - name: fetch
    type: python
    function: functions/fetch_soccer_standings.py
    entrypoint: main
    args: []

  - name: visualize
    type: python
    function: functions/visualize_soccer_standings.py
    entrypoint: main
    vizId: premier-league-standings
    depends_on:
      - fetch
