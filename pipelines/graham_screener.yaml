name: graham-screener
description: "Daily Ben Graham screen — finds US stocks whose P/E is below the earnings yield implied by the AA corporate bond rate (via FRED). Stock data from Financial Modeling Prep."
schedule: "0 22 * * 1-5"  # Weekdays at 10 PM UTC (after market close)

tasks:
  - name: fetch
    type: python
    function: functions/fetch_graham_screener.py
    entrypoint: main

  - name: visualize
    type: python
    function: functions/visualize_graham_screener.py
    entrypoint: main
    vizId: graham-screener-dashboard
    depends_on:
      - fetch
